syntax = "proto2";

package extensions.api.cast_channel;

message CastMessage {
  enum ProtocolVersion {
    CASTV2_1_0 = 0;
  }
  required ProtocolVersion protocol_version = 1;
  required string source_id = 2;
  required string destination_id = 3;
  required string namespace = 4;
  enum PayloadType {
    STRING = 0;
    BINARY = 1;
  }
  required PayloadType payload_type = 5;
  optional bytes payload_binary = 6;
  optional string payload_utf8 = 7;
}

message AuthChallenge {
  enum SignatureAlgorithm {
    RSASSA_PKCS1v15 = 0;
    RSASSA_PSS = 1;
  }
  optional SignatureAlgorithm signature_algorithm = 1 [default = RSASSA_PKCS1v15];
  optional bytes sender_nonce = 2;
  enum HashAlgorithm {
    SHA1 = 0;
    SHA256 = 1;
  }
  optional HashAlgorithm hash_algorithm = 3 [default = SHA1];
}

message AuthResponse {
  required bytes signature = 1;
  required bytes client_auth_certificate = 2;
  repeated bytes intermediate_certificate = 3;
  optional SignatureAlgorithm signature_algorithm = 4 [default = RSASSA_PKCS1v15];
  optional bytes sender_nonce = 5;
  optional HashAlgorithm hash_algorithm = 6 [default = SHA1];
  optional bytes crl = 7;
  enum SignatureAlgorithm {
    RSASSA_PKCS1v15 = 0;
    RSASSA_PSS = 1;
  }
  enum HashAlgorithm {
    SHA1 = 0;
    SHA256 = 1;
  }
}

message AuthError {
  enum ErrorType {
    INTERNAL_ERROR = 0;
    NO_TLS = 1;
    SIGNATURE_ALGORITHM_UNAVAILABLE = 2;
  }
  required ErrorType error_type = 1;
}

message DeviceAuthMessage {
  optional AuthChallenge challenge = 1;
  optional AuthResponse response = 2;
  optional AuthError error = 3;
}
